<!doctype html>
<html lang="ms">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuiz - Istilah Sains-AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#006782",
              secondary: "#004c5f",
            },
          },
        },
      };
    </script>
  </head>

  <body class="bg-gray-50 flex flex-col min-h-screen">
    <!-- NAV -->
     <nav
      class="sticky top-0 z-50 flex items-center justify-between px-6 h-20 bg-white/80 backdrop-blur-md border-b shadow-sm"
    >
      <a class="text-2xl font-bold text-gradient" href="index.html"
        >Istilah Sains-AI</a
      >

      <div class="flex items-center gap-8">
        <div class="hidden md:flex items-center gap-6">
          <a
            class="text-gray-600 hover:text-primary font-semibold"
            href="terms.html"
            >Istilah Sains</a
          >
          <a
            class="btn-gradient"
            href="quiz.html"
            >Kuiz</a
          >
        </div>
      </div>

      <input
        id="searchInput"
        class="hidden sm:block px-4 py-2 border rounded-full w-64"
        placeholder="Cari istilah..."
      />
    </nav>

    <!-- MAIN -->
    <main class="flex-grow flex items-center justify-center p-6">
      <div class="w-full max-w-3xl bg-white rounded-2xl shadow-md p-8">
        <!-- PROGRESS -->
        <div class="h-2 bg-gray-200 rounded-full mb-6">
          <div
            id="progressBar"
            class="h-2 bg-gradient-to-r from-secondary to-primary rounded-full w-0"
          ></div>
        </div>

        <!-- QUESTION -->
        <h2 id="question" class="text-2xl font-bold mb-6">Loading...</h2>

        <!-- OPTIONS -->
        <div id="options" class="flex flex-col gap-4"></div>

        <!-- RESULT -->
        <p id="result" class="mt-4 font-bold"></p>

        <!-- BUTTON -->
        <div class="flex flex-row gap-2">
          <button
            onclick="nextQuestion()"
            class="mt-6 px-6 py-3 bg-primary text-white rounded-full hover:bg-secondary transition"
            id="nextButton"
          >
            Seterusnya
          </button>
          <a
          href="index.html"
            class="mt-6 px-6 py-3 bg-red-600 text-white rounded-full hover:bg-secondary transition hidden"
            id="endButton"
          >
            Tamat Kuiz
          </link>
        </div>
      </div>
    </main>
  </body>

  <script src="script.js"></script>
</html>
