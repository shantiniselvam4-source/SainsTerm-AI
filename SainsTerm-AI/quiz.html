<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kuiz - Istilah Sains-AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#006782',
                        secondary: '#004c5f'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">

<!-- NAV -->
<nav class="flex justify-between items-center px-6 h-20 bg-white shadow-sm">
    <a href="index.html" class="text-xl font-bold text-gradient">Istilah Sains-AI</a>

    <div class="flex gap-6">
        <a href="terms.html" class="text-gray-600 hover:text-primary">Istilah</a>
        <a href="quiz.html" class="text-primary font-semibold border-b-2 border-primary">Kuiz</a>
    </div>
</nav>

<!-- MAIN -->
<main class="flex-grow flex items-center justify-center p-6">

    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-md p-8">

        <!-- PROGRESS -->
        <div class="h-2 bg-gray-200 rounded-full mb-6">
            <div id="progressBar" class="h-2 bg-gradient-to-r from-secondary to-primary rounded-full w-0"></div>
        </div>

        <!-- QUESTION -->
        <h2 id="question" class="text-2xl font-bold mb-6">Loading...</h2>

        <!-- OPTIONS -->
        <div id="options" class="flex flex-col gap-4"></div>

        <!-- RESULT -->
        <p id="result" class="mt-4 font-bold"></p>

        <!-- BUTTON -->
        <button onclick="nextQuestion()"
                class="mt-6 px-6 py-3 bg-primary text-white rounded-full hover:bg-secondary transition">
            Seterusnya
        </button>

    </div>

</main>

</body>

<script src="script.js"></script>
</html>
